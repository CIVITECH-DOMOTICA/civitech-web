<div class=" domotica-mensaje-container" data-aos="fade-down">
  <h2>Soluciones inteligentes para tu día a día</h2>
  <p class="subtitle">Descubre cómo la domótica real (sin nubes, sin cables, sin complicaciones) mejora tu vida.</p>
</div>

<div class="domotica-content">
  <div class="container-fluid">
    <div class="container-card">

      <!-- CARDS DINÁMICAS DESDE EL SERVICIO -->
      <a class="card-domotica" *ngFor="let useCase of useCases; let i = index" [attr.data-aos]="'fade-up'"
        [attr.data-aos-delay]="(i + 1) * 100" [routerLink]="['/domotica', useCase.slug]">
        <div class="container-icon-domotica image-mode">
          <img [src]="useCase.imagenCard || useCase.imagen" [alt]="useCase.titulo" loading="lazy" />
        </div>
        <p class="titulo">{{ useCase.titulo }}</p>
        <p>{{ useCase.descripcion }}</p>
        <div class="card-footer-info">Saber más <i class="fas fa-arrow-right"></i></div>
      </a>

    </div>
  </div>
</div>
